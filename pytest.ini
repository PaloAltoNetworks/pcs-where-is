[pytest]
# Pytest configuration file

# Register custom markers
markers =
    integration: marks tests as integration tests (run with: pytest -m integration)
    slow: marks tests as slow (deselect with: pytest -m "not slow")
    unit: marks tests as unit tests (run with: pytest -m unit)

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals

# Minimum version
minversion = 7.0

# Test paths
testpaths = .

# Ignore paths
norecursedirs = env .git __pycache__ .pytest_cache
